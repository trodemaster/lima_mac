# Lima configuration for macOS 26 (Tahoe) guest VM
#
# Requirements:
#   - Apple Silicon Mac (aarch64) — macOS guests only run on native arch via VZ
#   - Lima >= 2.1.0
#   - macOS 13.5+ host (for Virtualization.framework / vmType: vz)
#
# Usage:
#   limactl create --name=macos26 ./macos-26.yaml
#   limactl start macos26
#
# Apple Software License Agreement applies:
#   https://www.apple.com/legal/sla/
#
# ── Known caveats (Lima 2.1) ──────────────────────────────────────────────────
#   • No support for turning off the video display — always runs with a window.
#   • No automatic port forwarding — use `ssh -L` for manual tunnels, or rely
#     on the vzNAT IP to reach guest ports directly from the host.
#   • No support for custom caCerts.
#   • Password-less sudo is disabled inside the guest (except shutdown).
#   Ref: https://lima-vm.io/docs/usage/guests/macos/

minimumLimaVersion: "2.1.0"

# ── Image ──────────────────────────────────────────────────────────────────────

images:
- location: "https://updates.cdn-apple.com/2026WinterFCS/fullrestores/122-00766/062A6121-2ABE-45D7-BCB1-72B666B6D2C2/UniversalMac_26.4_25E246_Restore.ipsw"
  arch: "aarch64"

# macOS guests require VZ (Apple Virtualization.framework) — QEMU is not supported
vmType: "vz"
os: "Darwin"
arch: "aarch64"

# ── Resources ──────────────────────────────────────────────────────────────────

# Tune these to match your workload and available host resources.
cpus: 16
memory: "32GiB"
disk: "128GiB"

# ── Display ────────────────────────────────────────────────────────────────────

# The macOS installer requires a display device. Turning it off is not supported
# for macOS guests — "default" is the only practical choice here.
video:
  display: "default"

# ── Audio ──────────────────────────────────────────────────────────────────────

audio:
  # Pass audio through to the host via Virtualization.framework.
  # Set to "" to mute / disable audio.
  device: "vz"

# ── SSH ────────────────────────────────────────────────────────────────────────

ssh:
  # Agent forwarding is disabled for macOS guests. Lima's forwarding mechanism
  # creates a socket at /run/host-services/ssh-auth.sock which is a sealed
  # read-only path on macOS, causing a fatal degraded-mode error on first boot.
  # SSH access uses authorized_keys configured by configure.sh instead.
  forwardAgent: false
  # Also load ~/.ssh/*.pub so tools like rsync work without extra config.
  loadDotSSHPubKeys: true

# ── Networking ─────────────────────────────────────────────────────────────────

networks:
  # vzNAT gives the VM a routable IP accessible from the host (but not other guests).
  # Requires vmType: vz; no extra daemons needed.
  # Because automatic port forwarding is not supported for macOS guests, vzNAT
  # (or manual `ssh -L` tunnels) is the primary way to reach guest services.
  - vzNAT: true

# ── Filesystem mounts ──────────────────────────────────────────────────────────

# virtiofs is the default and fastest mount type for VZ instances.
mountType: "virtiofs"

mounts:
  # lima_mac project directory mounted read-write for VM testing and development.
  - location: "~/Developer/lima_mac"
    mountPoint: "/Volumes/lima_mac"
    writable: true

# ── Advanced VZ options ────────────────────────────────────────────────────────

vmOpts:
  vz:
    # "asif" is a sparse, copy-on-write disk format available on macOS 26+.
    # It saves significant disk space vs "raw". Cannot be converted back to "raw".
    # Set to "raw" if you need compatibility with older tooling.
    diskImageFormat: "asif"

    # Rosetta is only useful for Linux guests running x86_64 binaries.
    # Leave disabled for a macOS guest.
    rosetta:
      enabled: false
      binfmt: false

# Nested virtualisation lets you run another hypervisor inside this VM.
# Requires Apple M3 or later.
# nestedVirtualization: true

# ── Provisioning ──────────────────────────────────────────────────────────────

provision:
  # Sudo askpass helper — required by any provision script that needs sudo.
  # Lima randomly generates the guest password and stores it at ~/password
  # (i.e. /Users/${USER}.guest/password). This script reads it so that
  # SUDO_ASKPASS can supply the password non-interactively.
  # The guest password should be changed after first login.
  - mode: data
    path: /usr/local/bin/lima-sudo-askpass.sh
    permissions: 755
    content: |
      #!/bin/sh
      set -eu
      cat "$HOME/password"

  # Enable passwordless sudo for admin users via sudoers.d.
  # This allows provisioning scripts to run sudo commands without prompting for a password.
  # Must use `sudo -A` so that SUDO_ASKPASS is actually consulted (plain sudo ignores it).
  - mode: user
    script: |
      #!/bin/bash
      set -eux
      export SUDO_ASKPASS=/usr/local/bin/lima-sudo-askpass.sh
      if ! [[ -f /etc/sudoers.d/admin ]]; then
        echo "Granting all admin users nopasswd sudo access..."
        echo "%admin ALL=(ALL) NOPASSWD:ALL" | sudo -A tee /etc/sudoers.d/admin
      fi

  # Apply dotfiles via chezmoi (https://chezmoi.io).
  # This runs the configure.sh script which handles all VM configuration.
  # The script is idempotent — safe to re-run on restart.
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail
      /Volumes/lima_mac/configure.sh

# ── Port forwarding ────────────────────────────────────────────────────────────

# NOTE: Automatic port forwarding is NOT supported for macOS guests.
# To reach a port running in the guest, either:
#   a) Use the vzNAT IP directly (find it with `limactl shell macos26 ipconfig getifaddr en0`)
#   b) Set up a manual tunnel: ssh -F ~/.lima/macos26/ssh.config lima-macos26 -L 8080:localhost:8080 -N

# ── Message shown after `limactl start` ───────────────────────────────────────

message: |
  macOS 26 VM is ready.

  SSH into the guest:
    limactl shell {{.Name}}

  Find the guest IP (for direct access — port forwarding is not auto-configured):
    limactl shell {{.Name}} ipconfig getifaddr en0

  Manual port tunnel example (host:8080 → guest:8080):
    ssh -F ~/.lima/{{.Name}}/ssh.config lima-{{.Name}} -L 8080:localhost:8080 -N

  Read the GUI session password:
    limactl shell {{.Name}} cat /Users/${USER}.guest/password

  Change the password after first login via System Settings → Users & Groups
  or: limactl shell {{.Name}} passwd
